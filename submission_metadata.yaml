# ============================================================================
# AI tools declaration (transparency only; declared use is not penalized)
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude (Claude Code) for architecture discussion, dataset exploration,
  and code authoring/iteration during development. All design decisions were
  driven by direct analysis of the released dataset and JD. No candidate data is
  sent to any LLM at ranking time — the ranking step (rank.py) is pure standard
  library, CPU-only, and makes no network calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Transparent feature + rule ranker; no LLM calls, embeddings, or GPU at ranking
  time (all forbidden, and embeddings add nothing here — every non-ML-titled
  candidate has zero JD-domain evidence in the data). Five stages: (0) parse and
  derive features; (1) a plausibility gate that forces impossible profiles to
  tier 0 via numeric inconsistency (skill used longer than the whole career,
  "expert" with 0 months, a stint outlasting its own dates) — 0 honeypots reach
  the top 100; (2) a role-fit gate, the decisive trap defense, scoring whether
  the candidate is actually an AI/ML production engineer from title trajectory ×
  career ML-ness × production-evidence language, so keyword-stuffers (off-domain
  title, AI skills listed, non-ML role descriptions) collapse; (3) a weighted
  composite over explainable dimensions with disqualifier down-weights
  (dabbler, pure-research, consulting-only, perception-only, title-chaser,
  big-tech-only); (4) a multiplicative behavioral-availability modifier from the
  redrob_signals so perfect-on-paper-but-unreachable candidates drop; (5)
  grounded, non-templated reasoning per candidate. Runs in ~65s / 1.8 GB on CPU
  for 100K candidates. Weights and rules live in one config file (redrob/rubric.py).

# ============================================================================
# Declarations
